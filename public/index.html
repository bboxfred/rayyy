<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Rayyy — Phase 2</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>rayyy</h1>
        <p id="voice-tag" class="voice-tag">Voice: …</p>
      </header>

      <section id="status-card" class="card">
        <p id="status">Tap to start.</p>
        <p id="hint" class="hint">
          Earbuds recommended. Spacebar or earbud-tap toggles Talk.
        </p>
      </section>

      <!-- Viewfinder. Hidden until Rayyy fires enable_camera.
           The actual <video> element is created off-DOM in JS; this canvas
           is painted from it via requestAnimationFrame. Keeping <video>
           out of the DOM reduces (does not eliminate) iOS audio interference. -->
      <section id="viewfinder-card" class="card viewfinder-card hidden">
        <canvas id="viewfinder" width="640" height="480"></canvas>
        <p id="viewfinder-caption" class="hint">Looking…</p>
      </section>

      <section class="controls">
        <button id="start-btn" class="big">Tap to start</button>
        <button id="talk-btn" class="big primary" disabled>Talk</button>
      </section>

    </main>

    <script src="/app.js?v=5"></script>
  </body>
</html>
